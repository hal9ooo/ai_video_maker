<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Glowing 3D Sphere</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        overflow: hidden;
        background: #000;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      #canvas-container {
        width: 100vw;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(
          ellipse at center,
          #0a0a1a 0%,
          #000000 100%
        );
      }

      canvas {
        display: block;
      }

      .instructions {
        position: fixed;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        color: rgba(255, 255, 255, 0.4);
        font-size: 14px;
        letter-spacing: 2px;
        text-transform: uppercase;
        pointer-events: none;
        animation: pulse 2s ease-in-out infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 0.4;
        }
        50% {
          opacity: 0.8;
        }
      }
    </style>
  </head>
  <body>
    <div id="canvas-container"></div>
    <div class="instructions">Move your mouse</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
      // Scene setup
      const container = document.getElementById('canvas-container');
      const scene = new THREE.Scene();

      // Camera
      const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.z = 5;

      // Renderer
      const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      container.appendChild(renderer.domElement);

      // Create glowing sphere
      const geometry = new THREE.SphereGeometry(1.5, 64, 64);

      // Custom shader material for glow effect
      const vertexShader = `
          varying vec3 vNormal;
          varying vec3 vPosition;

          void main() {
              vNormal = normalize(normalMatrix * normal);
              vPosition = position;
              gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
          }
      `;

      const fragmentShader = `
          uniform float time;
          uniform vec2 mouse;
          varying vec3 vNormal;
          varying vec3 vPosition;

          void main() {
              // Base color with gradient
              vec3 color1 = vec3(0.1, 0.3, 0.9); // Blue
              vec3 color2 = vec3(0.9, 0.2, 0.5); // Pink
              vec3 color3 = vec3(0.2, 0.8, 0.6); // Cyan

              // Create flowing color based on position and time
              float flow = sin(vPosition.y * 3.0 + time) * 0.5 + 0.5;
              float flow2 = cos(vPosition.x * 2.0 + time * 0.7) * 0.5 + 0.5;

              vec3 baseColor = mix(color1, color2, flow);
              baseColor = mix(baseColor, color3, flow2 * 0.5);

              // Fresnel effect for edge glow
              vec3 viewDirection = normalize(cameraPosition - vPosition);
              float fresnel = pow(1.0 - abs(dot(vNormal, viewDirection)), 2.0);

              // Combine colors
              vec3 finalColor = baseColor + fresnel * vec3(0.5, 0.8, 1.0);

              // Add pulsing glow
              float glow = sin(time * 2.0) * 0.1 + 0.9;
              finalColor *= glow;

              // Mouse influence on color intensity
              float mouseInfluence = length(mouse) * 0.3;
              finalColor += mouseInfluence * vec3(0.2, 0.4, 0.8);

              gl_FragColor = vec4(finalColor, 0.95);
          }
      `;

      const material = new THREE.ShaderMaterial({
          uniforms: {
              time: { value: 0 },
              mouse: { value: new THREE.Vector2(0, 0) }
          },
          vertexShader: vertexShader,
          fragmentShader: fragmentShader,
          transparent: true
      });

      const sphere = new THREE.Mesh(geometry, material);
      scene.add(sphere);

      // Create outer glow shell
      const glowGeometry = new THREE.SphereGeometry(1.7, 64, 64);
      const glowMaterial = new THREE.ShaderMaterial({
          uniforms: {
              time: { value: 0 },
              mouse: { value: new THREE.Vector2(0, 0) }
          },
          vertexShader: `
              varying vec3 vNormal;
              void main() {
                  vNormal = normalize(normalMatrix * normal);
                  gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
              }
          `,
          fragmentShader: `
              uniform float time;
              uniform vec2 mouse;
              varying vec3 vNormal;

              void main() {
                  vec3 viewDirection = normalize(cameraPosition);
                  float intensity = pow(0.7 - dot(vNormal, viewDirection), 2.0);

                  vec3 glowColor = mix(
                      vec3(0.2, 0.4, 1.0),
                      vec3(1.0, 0.3, 0.6),
                      sin(time * 0.5) * 0.5 + 0.5
                  );

                  float mouseGlow = (abs(mouse.x) + abs(mouse.y)) * 0.2;
                  glowColor += mouseGlow * vec3(0.3, 0.5, 1.0);

                  gl_FragColor = vec4(glowColor, intensity * 0.6);
              }
          `,
          transparent: true,
          side: THREE.BackSide,
          blending: THREE.AdditiveBlending
      });

      const glowSphere = new THREE.Mesh(glowGeometry, glowMaterial);
      scene.add(glowSphere);

      // Add particles
      const particleCount = 200;
      const particleGeometry = new THREE.BufferGeometry();
      const positions = new Float32Array(particleCount * 3);

      for (let i = 0; i < particleCount; i++) {
          const radius = 3 + Math.random() * 3;
          const theta = Math.random() * Math.PI * 2;
          const phi = Math.acos(2 * Math.random() - 1);

          positions[i * 3] = radius * Math.sin(phi) * Math.cos(theta);
          positions[i * 3 + 1] = radius * Math.sin(phi) * Math.sin(theta);
          positions[i * 3 + 2] = radius * Math.cos(phi);
      }

      particleGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

      const particleMaterial = new THREE.PointsMaterial({
          color: 0x4488ff,
          size: 0.05,
          transparent: true,
          opacity: 0.6,
          blending: THREE.AdditiveBlending
      });

      const particles = new THREE.Points(particleGeometry, particleMaterial);
      scene.add(particles);

      // Mouse tracking
      let mouseX = 0;
      let mouseY = 0;
      let targetMouseX = 0;
      let targetMouseY = 0;

      document.addEventListener('mousemove', (event) => {
          targetMouseX = (event.clientX / window.innerWidth) * 2 - 1;
          targetMouseY = -(event.clientY / window.innerHeight) * 2 + 1;
      });

      // Touch support
      document.addEventListener('touchmove', (event) => {
          const touch = event.touches[0];
          targetMouseX = (touch.clientX / window.innerWidth) * 2 - 1;
          targetMouseY = -(touch.clientY / window.innerHeight) * 2 + 1;
      });

      // Handle resize
      window.addEventListener('resize', () => {
          camera.aspect = window.innerWidth / window.innerHeight;
          camera.updateProjectionMatrix();
          renderer.setSize(window.innerWidth, window.innerHeight);
      });

      // Animation loop
      const clock = new THREE.Clock();

      function animate() {
          requestAnimationFrame(animate);

          const elapsedTime = clock.getElapsedTime();

          // Smooth mouse movement
          mouseX += (targetMouseX - mouseX) * 0.05;
          mouseY += (targetMouseY - mouseY) * 0.05;

          // Update shader uniforms
          material.uniforms.time.value = elapsedTime;
          material.uniforms.mouse.value.set(mouseX, mouseY);
          glowMaterial.uniforms.time.value = elapsedTime;
          glowMaterial.uniforms.mouse.value.set(mouseX, mouseY);

          // Rotate sphere based on mouse
          sphere.rotation.y += 0.005 + mouseX * 0.02;
          sphere.rotation.x += 0.003 + mouseY * 0.02;

          // Rotate glow sphere slightly differently
          glowSphere.rotation.y = sphere.rotation.y * 0.8;
          glowSphere.rotation.x = sphere.rotation.x * 0.8;

          // Rotate particles
          particles.rotation.y = elapsedTime * 0.1;
          particles.rotation.x = elapsedTime * 0.05;

          // Camera follows mouse slightly
          camera.position.x = mouseX * 0.5;
          camera.position.y = mouseY * 0.5;
          camera.lookAt(scene.position);

          // Pulse particle colors
          const hue = (elapsedTime * 0.1) % 1;
          particleMaterial.color.setHSL(hue, 0.8, 0.6);

          renderer.render(scene, camera);
      }

      animate();
    </script>
  </body>
</html>
